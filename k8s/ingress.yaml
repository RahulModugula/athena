apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: athena-ingress
  namespace: athena
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: athena.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: athena-backend
                port:
                  number: 8000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: athena-backend
                port:
                  number: 8000
