apiVersion: apps/v1
kind: Deployment
metadata:
  name: athena-backend
  namespace: athena
  labels:
    app: athena-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: athena-backend
  template:
    metadata:
      labels:
        app: athena-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/${GITHUB_REPOSITORY}/athena-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: athena-config
            - secretRef:
                name: athena-secrets
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: athena-backend-hpa
  namespace: athena
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: athena-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
