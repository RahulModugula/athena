apiVersion: v1
kind: ConfigMap
metadata:
  name: athena-config
  namespace: athena
data:
  LOG_LEVEL: "INFO"
  CORS_ORIGINS: '["https://athena.example.com"]'
  ATHENA_EMBEDDING_MODEL: "BAAI/bge-m3"
  ATHENA_RERANKER_MODEL: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  ATHENA_CHUNK_SIZE: "512"
  ATHENA_CHUNK_OVERLAP: "100"
  ATHENA_TOP_K: "10"
  ATHENA_RERANK_TOP_K: "5"
  ATHENA_LLM_PROVIDER: "openrouter"
  ATHENA_OPENROUTER_MODEL: "openai/gpt-oss-20b:free"
  ATHENA_GRAPH_RAG_ENABLED: "false"
  ATHENA_CACHE_ENABLED: "true"
