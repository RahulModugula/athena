name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: athena
          POSTGRES_PASSWORD: athena
          POSTGRES_DB: athena
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: ruff check app/ tests/

      - name: Type check
        run: mypy app/

      - name: Test
        env:
          ATHENA_DATABASE_URL: postgresql+asyncpg://athena:athena@localhost:5432/athena
          ATHENA_LLM_PROVIDER: openrouter
          ATHENA_OPENROUTER_API_KEY: placeholder
          ATHENA_OPENROUTER_MODEL: openai/gpt-oss-20b:free
        run: pytest tests/ -v --tb=short --cov=app --cov-report=term-missing

      - name: Eval quality gate
        if: github.event_name == 'pull_request'
        env:
          ATHENA_DATABASE_URL: postgresql+asyncpg://athena:athena@localhost:5432/athena
          ATHENA_LLM_PROVIDER: openrouter
          ATHENA_OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ATHENA_OPENROUTER_MODEL: openai/gpt-oss-20b:free
        # Only runs when the secret is available (skips on forks)
        run: |
          if [ -n "$ATHENA_OPENROUTER_API_KEY" ] && [ "$ATHENA_OPENROUTER_API_KEY" != "placeholder" ]; then
            python -m eval.runner --benchmark --fail-below faithfulness=0.70 answer_relevance=0.70
          else
            echo "Skipping eval gate — OPENROUTER_API_KEY not set"
          fi

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase image owner
        run: echo "IMAGE_OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ env.IMAGE_OWNER }}/athena-backend:latest
            ghcr.io/${{ env.IMAGE_OWNER }}/athena-backend:${{ github.sha }}

  k8s-validate:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Validate k8s manifests (YAML syntax)
        run: |
          python3 -c "
          import yaml, sys, pathlib
          files = list(pathlib.Path('k8s').rglob('*.yaml'))
          errors = []
          for f in files:
              try:
                  list(yaml.safe_load_all(f.read_text()))
                  print(f'OK {f}')
              except yaml.YAMLError as e:
                  errors.append(f'FAIL {f}: {e}')
          if errors:
              print('\n'.join(errors)); sys.exit(1)
          print(f'All {len(files)} manifests valid.')
          "
