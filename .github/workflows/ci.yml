name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check athena_verify/ tests/

      - name: Type check
        run: mypy athena_verify/

      - name: Test
        run: pytest tests/ -v --tb=short --cov=athena_verify --cov-report=term-missing

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage

  benchmark-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install with NLI
        run: pip install -e ".[dev,nli]"

      - name: Smoke test benchmark scripts
        run: |
          python -c "from benchmarks.run_ragtruth import load_ragtruth, compute_ece; print('RAGTruth runner imports OK')"
          python -c "from benchmarks.run_halueval import load_halueval, compute_ece; print('HaluEval runner imports OK')"
          python -c "from benchmarks.run_factscore import load_factscore, compute_ece; print('FActScore runner imports OK')"
          python -c "from benchmarks.run_baselines import load_dataset; print('Baselines runner imports OK')"
