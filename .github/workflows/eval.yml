name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      benchmark:
        description: "Which benchmark to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - ragtruth
          - halueval
          - factscore
      limit:
        description: "Max examples (0 = all)"
        required: false
        default: "0"

jobs:
  run-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install athena-verify with NLI
        run: pip install -e ".[nli]"

      - name: Run RAGTruth benchmark
        if: inputs.benchmark == 'all' || inputs.benchmark == 'ragtruth'
        run: |
          LIMIT_ARG=""
          if [ "${{ inputs.limit }}" != "0" ]; then
            LIMIT_ARG="--limit ${{ inputs.limit }}"
          fi
          python benchmarks/run_ragtruth.py \
            --data-dir ./data/ragtruth \
            --output benchmarks/results/ragtruth.json \
            $LIMIT_ARG || echo "RAGTruth data not available"

      - name: Run HaluEval benchmark
        if: inputs.benchmark == 'all' || inputs.benchmark == 'halueval'
        run: |
          LIMIT_ARG=""
          if [ "${{ inputs.limit }}" != "0" ]; then
            LIMIT_ARG="--limit ${{ inputs.limit }}"
          fi
          python benchmarks/run_halueval.py \
            --data-dir ./data/halueval \
            --output benchmarks/results/halueval.json \
            $LIMIT_ARG || echo "HaluEval data not available"

      - name: Run FActScore benchmark
        if: inputs.benchmark == 'all' || inputs.benchmark == 'factscore'
        run: |
          LIMIT_ARG=""
          if [ "${{ inputs.limit }}" != "0" ]; then
            LIMIT_ARG="--limit ${{ inputs.limit }}"
          fi
          python benchmarks/run_factscore.py \
            --data-dir ./data/factscore \
            --output benchmarks/results/factscore.json \
            $LIMIT_ARG || echo "FActScore data not available"

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: benchmark-results
          path: benchmarks/results/
